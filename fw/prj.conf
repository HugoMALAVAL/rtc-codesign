# ═══════════════════════════════════════════════════════════════
#  prj.conf — RTC STM32F746G-DISCO + LVGL 9 / Zephyr 4.2
#  DEBUG BUILD : RTT activé, RTC optionnel
# ═══════════════════════════════════════════════════════════════

# --- 1. BUS I2C ET HORLOGE (optionnel si non branché) ---
CONFIG_I2C=y
CONFIG_RTC=y
CONFIG_RTC_PCF8563=y

# --- 2. UART (Mode Binaire Silencieux — console désactivée) ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_CONSOLE=n

# --- 3. DEBUG via RTT Segger (fonctionne sans UART console) ---
# Branche J-Link/ST-Link, lis avec "JLinkRTTViewer" ou "openocd -c rtt"
CONFIG_USE_SEGGER_RTT=y
# RTT console desactive, on redirige seulement les logs
CONFIG_RTT_CONSOLE=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=1024
# printk redirigé vers RTT uniquement
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
# 3=INFO 4=DEBUG
CONFIG_LOG_DEFAULT_LEVEL=3

# --- 4. AFFICHAGE LCD (STM32F746G-DISCO = LTDC RGB 480x272) ---
CONFIG_DISPLAY=y

# --- 5. TOUCH : INPUT subsystem Zephyr 4.x ---
CONFIG_INPUT=y

# --- 6. LVGL 9 ---
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_POINTER_INPUT=y
CONFIG_LV_USE_THEME_DEFAULT=y
CONFIG_LV_THEME_DEFAULT_DARK=y
CONFIG_LV_FONT_MONTSERRAT_10=y
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_32=y

# --- 7. FPU STM32F7 ---
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- 8. KERNEL ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_THREAD_NAME=y
